<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Controller Financiero</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Login */
    #login-screen {
      position:fixed; top:0; left:0; right:0; bottom:0; width:100%; height:100%;
      background:linear-gradient(150deg,#1e3a8a 0%,#2563eb 100%);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px; box-sizing:border-box;
    }
    #login-screen.hidden { display:none !important; }
    #login-card { background:#fff; border-radius:20px; padding:40px 28px; width:100%; max-width:340px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .login-icon { font-size:48px; margin-bottom:12px; }
    #login-card h2 { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:6px; }
    #login-card p  { font-size:14px; color:#64748b; margin-bottom:28px; }
    #login-form { display:flex; flex-direction:column; gap:12px; }
    #login-pass { padding:14px 16px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:18px; text-align:center; letter-spacing:.2em; outline:none; width:100%; box-sizing:border-box; }
    #login-pass:focus { border-color:#2563eb; }
    #login-pass.shake { border-color:#dc2626; animation:shake .35s ease; }
    #login-form button { padding:14px; background:#2563eb; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; width:100%; }
    #login-error { color:#dc2626; font-size:13px; display:none; }
    #login-error.show { display:block; }

    /* Onboarding */
    #onboarding-screen {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:#f1f5f9; z-index:9998; overflow-y:auto;
      display:flex; flex-direction:column;
    }
    #onboarding-screen.hidden { display:none !important; }
    .ob-header { background:#2563eb; color:#fff; padding:16px 20px 12px; position:sticky; top:0; z-index:10; }
    .ob-progress { height:4px; background:rgba(255,255,255,.3); border-radius:2px; margin-bottom:8px; }
    #ob-progress-fill { height:100%; background:#fff; border-radius:2px; transition:width .4s ease; }
    #ob-paso-label { font-size:12px; opacity:.8; }
    .ob-body { padding:20px 16px 120px; max-width:480px; margin:0 auto; width:100%; box-sizing:border-box; }
    .ob-hero  { font-size:52px; text-align:center; margin-bottom:12px; }
    .ob-title { font-size:22px; font-weight:700; text-align:center; color:#1e293b; margin-bottom:8px; }
    .ob-desc  { font-size:14px; color:#64748b; text-align:center; margin-bottom:24px; line-height:1.5; }
    .ob-item-row { background:#fff; border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
    .ob-toggle-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; font-size:14px; }
    .ob-resumen { background:#f8fafc; border-radius:12px; padding:14px; margin-top:16px; border:1px solid #e2e8f0; }
    .ob-resumen-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#64748b; margin-bottom:10px; }
    .ob-resumen-row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px solid #e2e8f0; }
    .ob-resumen-row:last-child { border-bottom:none; }
    .ob-resumen-row .green { color:#16a34a; }
    .ob-resumen-row .red   { color:#dc2626; }
    .ob-footer {
      position:fixed; bottom:0; left:0; right:0;
      background:#fff; border-top:1px solid #e2e8f0;
      padding:12px 16px; display:flex; flex-direction:column; gap:8px;
      max-width:480px; margin:0 auto; box-sizing:border-box;
    }
    #ob-error { color:#dc2626; font-size:13px; text-align:center; min-height:18px; }
    #ob-error.show { display:block; }
    .toggle { position:relative; display:inline-block; width:44px; height:24px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:#cbd5e1; border-radius:24px; transition:.3s; cursor:pointer; }
    .toggle-slider::before { content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; }
    .toggle input:checked + .toggle-slider { background:#2563eb; }
    .toggle input:checked + .toggle-slider::before { transform:translateX(20px); }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }
  </style>
</head>
<body>
  <!-- App principal -->
  <div id="app">
    <header class="header">
      <span style="font-size:22px">💰</span>
      <h1>Controller Financiero</h1>
      <span class="mes-label" id="header-nombre"></span>
    </header>
    <main id="main-content"></main>
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard"><span class="nav-icon">📊</span><span>Resumen</span></button>
      <button class="nav-btn" data-view="registro"><span class="nav-icon">➕</span><span>Registrar</span></button>
      <button class="nav-btn" data-view="flujo"><span class="nav-icon">📋</span><span>Flujo</span></button>
      <button class="nav-btn" data-view="deudas"><span class="nav-icon">🏦</span><span>Deudas</span></button>
      <button class="nav-btn" data-view="metas"><span class="nav-icon">🎯</span><span>Metas</span></button>
      <button class="nav-btn" data-view="config"><span class="nav-icon">⚙️</span><span>Config</span></button>
    </nav>
  </div>

  <!-- Login -->
  <div id="login-screen">
    <div id="login-card">
      <div class="login-icon">💰</div>
      <h2>Controller Financiero</h2>
      <p>Ingresa tu contraseña para continuar</p>
      <form id="login-form">
        <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" autofocus>
        <div id="login-error">Contraseña incorrecta</div>
        <button type="submit">Entrar</button>
      </form>
      <p style="margin-top:24px;font-size:11px;color:#94a3b8">rocio.rojas@dataconsultingrrl.com</p>
    </div>
  </div>

  <!-- Onboarding wizard -->
  <div id="onboarding-screen" class="hidden">
    <div class="ob-header">
      <div class="ob-progress"><div id="ob-progress-fill" style="width:0%"></div></div>
      <span id="ob-paso-label">Paso 1 de 7</span>
    </div>
    <div class="ob-body" id="onboarding-body"></div>
    <div class="ob-footer">
      <div id="ob-error"></div>
      <div style="display:flex;gap:10px">
        <button id="ob-btn-back" class="btn btn-outline" style="flex:1">← Atrás</button>
        <button id="ob-btn-next" class="btn btn-primary" style="flex:2">Siguiente →</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/seed.js"></script>
  <script src="js/store.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('ob-btn-next').addEventListener('click', async () => {
        if (!Onboarding.guardarPaso()) return;
        if (Onboarding.paso === Onboarding.totalPasos) {
          document.getElementById('ob-btn-next').textContent = 'Guardando...';
          await Onboarding.finalizar();
        } else {
          Onboarding.paso++;
          Onboarding.renderPaso();
          document.getElementById('ob-btn-next').textContent =
            Onboarding.paso === Onboarding.totalPasos ? '✓ Finalizar' : 'Siguiente →';
        }
      });
      document.getElementById('ob-btn-back').addEventListener('click', () => {
        if (Onboarding.paso > 1) {
          Onboarding.paso--;
          Onboarding.renderPaso();
          document.getElementById('ob-btn-next').textContent = 'Siguiente →';
        }
      });
      Auth.init();
    });
  </script>
</body>
</html>
